<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Guidance Academy</title>
    <link href="styles.css" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
    <!-- Survey Card -->
    <div id="survey-card">
        <button id="survey-close">✕</button>
        <div id="stage-1">
            <h3>Interested in our courses?</h3>
            <div id="stage-1-buttons">
                <button class="choice-btn yes-btn" onclick="handleInterest('yes')">Yes!</button>
                <button class="choice-btn no-btn" onclick="handleInterest('no')">No.</button>
                <button class="choice-btn may-btn" onclick="handleInterest('maybe')">Will Think...</button>
            </div>
        </div>
        <div id="stage-2" class="hidden">
            <h3>Great! Tell us about Yourself</h3>
            <input type="text" id="s-name" placeholder="Your Name" />
            <input type="text" id="i-name" placeholder="Your School/College name" />
            <input type="text" id="c-name" placeholder="Interested Subject/Course" />
            <input type="tel" id="s-phone" placeholder="Phone Number" />
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACuyOXqycnJ5LVcZ"></div>
            <button id="survey-submit">Get Callback →</button>
        </div>
        <div id="stage-3" class="hidden">
            <div id="thankyou-content"></div>
        </div>

    </div>

    <div id="survey-tab">Enquire</div>

    <!--Images-->
    <div style="display: block;">

        <img class="page-img lazy" data-src="files/cLh.webp">
        <img class="page-img lazy" data-src="files/NKR.webp">
        <img class="page-img lazy" data-src="files/d6m.webp">
        <img class="page-img lazy" data-src="files/GBC.webp">
        <img class="page-img lazy" data-src="files/Rd7.webp">
        <img class="page-img lazy" data-src="files/wsm.webp">
        <img class="page-img lazy" data-src="files/881.webp">
        <img class="page-img lazy" data-src="files/XXW.webp">
        <img class="page-img lazy" data-src="files/R3j.webp">
        <img class="page-img lazy" data-src="files/cDS.webp">
        <img class="page-img lazy" data-src="files/761.webp">
        <img class="page-img lazy" data-src="files/dEQ.webp">
        <img class="page-img lazy" data-src="files/yJ9.webp">
        <img class="page-img lazy" data-src="files/BjC.webp">
        <img class="page-img lazy" data-src="files/4MJ.webp">
        <img class="page-img lazy" data-src="files/uWz.webp">
        <img class="page-img lazy" data-src="files/ZHC.webp">
        <img class="page-img lazy" data-src="files/tHZ.webp">

    </div>


    <script>

        document.addEventListener("contextmenu", event => event.preventDefault());

        const images = document.querySelectorAll(".lazy");

        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {

                    const img = entry.target;
                    const src = img.dataset.src;

                    img.src = src;

                    img.onload = () => {
                        img.classList.add("loaded");
                    };

                    observer.unobserve(img);

                }

            });

        }, { threshold: 0.1 });

        images.forEach(img => observer.observe(img));

    </script>

    <script src="https://cdn.counter.dev/script.js" data-id="65907582-c48c-4edb-867e-8134a7c446e5"
        data-utcoffset="6"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7N0QQG60R4"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-7N0QQG60R4');
    </script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const source = params.get("ok") || params.get("ok");

        if (source) {
            gtag('event', 'qr_scan', {
                qr_location: source
            });
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
