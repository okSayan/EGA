<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Evolution Guidance Academy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff;
        }

        #topbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 40px;
            background: #5160ff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: white;
            z-index: 10;
        }

        #download {
            background: white;
            color: #5160ff;
            padding: 4px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            margin-right: auto;
        }

        .page-img {
            width: 100%;
            max-width: 900px;
            display: block;
            margin: 0 auto 30px auto;

            filter: blur(10px);
            opacity: 0;
            transition: opacity .4s ease, filter .4s ease;
        }

        .page-img.loaded {
            opacity: 1;
            filter: blur(0);
        }

        img {
            pointer-events: none;
        }

        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

    </style>

</head>

<body>

    <div id="topbar">
        <a id="download" href="ega.pdf" download>Download PDF</a>
    </div>

    <div style="display: block; margin-top: 45px;">

        <img class="page-img lazy" data-src="images/1.png">
        <img class="page-img lazy" data-src="images/2.jpeg">
        <img class="page-img lazy" data-src="images/3.jpeg">
        <img class="page-img lazy" data-src="images/4.jpeg">
        <img class="page-img lazy" data-src="images/5.png">
        <img class="page-img lazy" data-src="images/6.jpg">
        <img class="page-img lazy" data-src="images/7.png">
        <img class="page-img lazy" data-src="images/8.png">
        <img class="page-img lazy" data-src="images/9.png">
        <img class="page-img lazy" data-src="images/10.png">
        <img class="page-img lazy" data-src="images/11.png">
        <img class="page-img lazy" data-src="images/12.png">

    </div>


    <script>

        document.addEventListener("contextmenu", event => event.preventDefault());

        const images = document.querySelectorAll(".lazy");

        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {

                    const img = entry.target;
                    const src = img.dataset.src;

                    img.src = src;

                    img.onload = () => {
                        img.classList.add("loaded");
                    };

                    observer.unobserve(img);

                }

            });

        }, { threshold: 0.1 });

        images.forEach(img => observer.observe(img));

    </script>

</body>
</html>
