<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>PDF Viewer</title>

<style>
    body {
        margin: 0;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #loader {
        display: flex;
        gap: 8px;
    }
    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #333;
        animation: bounce 0.6s infinite alternate;
    }
    .dot:nth-child(2) {
        animation-delay: 0.2s;
    }
    .dot:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes bounce {
        from { transform: translateY(0); }
        to { transform: translateY(-15px); }
    }

    iframe {
        display: none; /* hide until loaded */
        width: 100vw;
        height: 100vh;
        border: none;
    }
</style>
</head>

<body>

<div id="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

<iframe id="pdfViewer" src="ega.pdf"></iframe>

<script>
    const iframe = document.getElementById("pdfViewer");
    const loader = document.getElementById("loader");

    iframe.onload = () => {
        loader.style.display = "none";
        iframe.style.display = "block";
    };
</script>

</body>
</html>
