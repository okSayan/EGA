<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>PDF Viewer</title>

    <style>
        body {
            margin: 0;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 3px;
            color: #5160ff;
        }



        #loader {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #5160ff;
            border-radius: 50%;
            animation: bounce 0.6s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.30s;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            50% {
                transform: translateY(-6px);
                opacity: 0.5;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        iframe {
            display: none;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>

<body>

    <div id="title">Evolution Guidance Academy</div>

    <div id="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <iframe id="pdfViewer"></iframe>

<script>
    const loader = document.getElementById("loader");
    const title = document.getElementById("title");

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.width = "100%";
    iframe.height = "100%";
    iframe.style.border = "none";

    iframe.onload = () => {
        loader.style.display = "none";
        title.style.display = "none";
        iframe.style.display = "block";
    };

    // delay iframe creation to allow animation to begin smoothly
    setTimeout(() => {
        iframe.src = "ega.pdf";        // your PDF here
        document.body.appendChild(iframe);
    }, 200); // tweak this delay if necessary
</script>


</body>

</html>
